<header>
    <div
        style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <a href="/" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 32px;">🪘</span>
                <h1>Thế Giới Âm Nhạc</h1>
            </a>
        </div>
        <nav id="main-nav">
            {% for item in nav_items %}
            <a class="nav-link" href="{{ item.href }}">{{ item.text }}</a>
            {% endfor %}
        </nav>
    </div>
</header>
